services:
  mysql_kccitm:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_DATABASE: 'student_db'
      MYSQL_USER: 'user'
      MYSQL_PASSWORD: 'qCsfeuECc3MW'
      MYSQL_ROOT_PASSWORD: 'qCsfeuECc3MW'
    ports:
      - '127.0.0.1:3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-custom.cnf:/etc/mysql/conf.d/custom.cnf
    # networks:
    #   - kccitm_shared_net

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ['milvus', 'run', 'standalone']
    restart: always
    ports:
      - '19530:19530'
      - '9091:9091'
    volumes:
      - milvus_data:/var/lib/milvus
    environment:
      ETCD_USE_EMBED: 'true'
      COMMON_STORAGETYPE: 'local'

volumes:
  mysql_data:
  milvus_data:
